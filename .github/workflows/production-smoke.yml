name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production or staging base URL"
        required: true
        type: string
      paths:
        description: "Comma-separated paths to smoke test"
        required: true
        default: "/login,/dashboard"
        type: string

jobs:
  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke checks
        run: python3 scripts/smoke_check.py --base-url "${{ inputs.base_url }}" --paths "${{ inputs.paths }}"
