name: Loop CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  loop-runtime:
    name: Loop runtime tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Loop tests
        run: python3 -m unittest discover -s tests -v

  tea-finance:
    name: Tea finance build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tea-finance-system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tea-finance-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database tests
        run: npm run test:db

      - name: Build application
        run: npm run build
